services:
  - type: web
    name: unitflow-api
    runtime: python
    rootDir: apps/api
    plan: free
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python manage_db.py upgrade
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: AUTO_CREATE_SCHEMA
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: JWT_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "720"
      - key: DATABASE_URL
        fromDatabase:
          name: unitflow-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ORIGIN_REGEX
        value: ""
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_STRATEGY_EXPLANATION_ENABLED
        value: "true"
      - key: OPENAI_STRATEGY_EXPLANATION_TIMEOUT_SECONDS
        value: "8"

databases:
  - name: unitflow-db
    plan: free
    databaseName: unitflow
    user: unitflow
